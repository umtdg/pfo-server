# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build, test, analyze, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build
      run: ./gradlew --info build

    - name: Test
      run: ./gradlew --info jacocoTestReport

      # Quality Gate success is not required until I get the tests and coverege in order
    - name: Sonar analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_PROJECT_KEY: 'umtdg_pfo-server'
        SONAR_ORGANIZATION: 'umtdg'
      # run: ./gradlew --info sonar -Dsonar.qualitygate.wait=true
      run: ./gradlew --info sonar

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

      # bootBuildImage.publish is already false by default, but it is
      # set here to false for clarity
    - name: Build Docker image
      run: ./gradlew bootBuildImage -PbootBuildImage.publish=false
      env:
        DOCKER_REGISTRY: 'docker.io'
        DOCKER_PATH: ${{ secrets.DOCKER_USERNAME }}

    - name: Publish image to docker.io
      if: ${{ github.event_name != 'pull_request' }}
      run: ./gradlew bootBuildImage -PbootBuildImage.publish=true
      env:
        DOCKER_REGISTRY: 'docker.io'
        DOCKER_PATH: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  dependency-submission:
    name: Generate and submit dependency graph
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
